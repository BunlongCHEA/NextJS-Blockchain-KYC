# ServiceAccount for the NextJS frontend pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kyc-frontend-sa
  namespace: kyc-blockchain-frontend
  labels:
    app.kubernetes.io/name: kyc-blockchain-frontend

---
# The frontend pod never touches the database directly — Go handles all DB.
# This Role is minimal: just enough for health-check liveness (no extra perms needed).
# Included for completeness and to allow future service-account-bound features.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyc-frontend-role
  namespace: kyc-blockchain-frontend
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]   # minimal — liveness probe uses httpGet not kubectl

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kyc-frontend-rolebinding
  namespace: kyc-blockchain-frontend
subjects:
  - kind: ServiceAccount
    name: kyc-frontend-sa
    namespace: kyc-blockchain-frontend
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: kyc-frontend-role