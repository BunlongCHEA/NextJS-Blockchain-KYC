# ArgoCD Application — NextJS KYC Frontend
# Mirrors the pattern from k8s/argocd/app/blockchain-application.yaml in the Go repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyc-blockchain-frontend
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kyc-system
spec:
  project: default

  source:
    # Point this at your NextJS GitLab repo URL
    repoURL: https://gitlab.com/BunlongCHEA/NextJS-Blockchain-KYC.git
    targetRevision: HEAD
    path: k8s/app
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kyc-blockchain-frontend

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true    # auto-create namespace if missing