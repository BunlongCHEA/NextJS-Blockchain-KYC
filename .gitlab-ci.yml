variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  KUBE_NAMESPACE: "kyc-blockchain-frontend"

  # Trivy settings
  # CRITICAL severity blocks the pipeline. HIGH is reported but non-blocking.
  # To also block on HIGH: set TRIVY_SEVERITY to "HIGH,CRITICAL"
  TRIVY_SEVERITY: "CRITICAL"
  TRIVY_EXIT_CODE: "1"            # exit 1 = fail pipeline on findings
  TRIVY_IGNORE_UNFIXED: "true"    # skip vulns with no fix yet (reduces noise)
  TRIVY_NO_PROGRESS: "true"       # cleaner CI log output
  TRIVY_FORMAT: "table"           # human-readable in CI log

stages:
  - build
  - scan
  - deploy

# в”Ђв”Ђв”Ђ Build & Push Docker Image в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
build:
  stage: build
  image: docker:28.3.3
  services:
    - docker:28.3.3-dind
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - docker context create tls-environment
    - docker buildx create tls-environment --use
  script:
    - echo "Building NextJS Docker image for arm64 (Raspberry Pi 5)..."
    - |
      docker buildx build \
        --platform linux/arm64 \
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA \
        -t $CI_REGISTRY_IMAGE:latest \
        --push \
        .
    - echo "вњ“ NextJS Docker image (arm64) pushed successfully"
  only:
    - main
    - develop

# в”Ђв”Ђв”Ђ Trivy Security Scan в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Scans the image that was just pushed.
# Three reports are produced:
#   1. Table in the CI log                    вЂ” immediate human-readable feedback
#   2. trivy-report.json                      вЂ” full report (downloadable artifact)
#   3. gl-container-scanning-report.json      вЂ” GitLab Security Dashboard format
#
# Scans the registry image directly so the exact artifact that will be deployed
# is what gets scanned вЂ” no local cache or rebuild inconsistency.
scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]   # override so we can run shell commands
  needs:
    - job: build       # only runs after build succeeds
  before_script:
    - trivy registry login --username $CI_REGISTRY_USER --password $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Running Trivy security scan on $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA ..."
 
    # в”Ђв”Ђ 1. Table report in CI log (blocking on CRITICAL) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - |
      trivy image \
        --platform linux/arm64 \
        --severity $TRIVY_SEVERITY \
        --exit-code $TRIVY_EXIT_CODE \
        --ignore-unfixed=$TRIVY_IGNORE_UNFIXED \
        --no-progress=$TRIVY_NO_PROGRESS \
        --format $TRIVY_FORMAT \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
 
    # в”Ђв”Ђ 2. Full JSON report (artifact вЂ” HIGH + CRITICAL, non-blocking) в”Ђв”Ђв”Ђв”Ђ
    - |
      trivy image \
        --platform linux/arm64 \
        --severity HIGH,CRITICAL \
        --exit-code 0 \
        --ignore-unfixed=$TRIVY_IGNORE_UNFIXED \
        --no-progress=$TRIVY_NO_PROGRESS \
        --format json \
        --output trivy-report.json \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
 
    # в”Ђв”Ђ 3. GitLab Security Dashboard format в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - |
      trivy image \
        --platform linux/arm64 \
        --severity HIGH,CRITICAL \
        --exit-code 0 \
        --ignore-unfixed=$TRIVY_IGNORE_UNFIXED \
        --no-progress=$TRIVY_NO_PROGRESS \
        --format template \
        --template "@/contrib/gitlab.tpl" \
        --output gl-container-scanning-report.json \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
 
    - echo "вњ“ Trivy scan complete"
 
  artifacts:
    when: always      # save reports even when scan finds issues
    expire_in: 3d
    paths:
      - trivy-report.json
      - gl-container-scanning-report.json
    reports:
      # Populates GitLab в†’ Security в†’ Container Scanning dashboard
      container_scanning: gl-container-scanning-report.json
 
  allow_failure: false  # CRITICAL findings block the deploy stage
 
  only:
    - main
    - develop

# в”Ђв”Ђв”Ђ Deploy to K3s via ArgoCD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
deploy:
  stage: deploy
  tags:
    - pi5-1-arm64-ubuntu                         # this is the tag for job runner created
  before_script:
    - echo "Using local k3s API on the Pi - no kubeconfig copy needed"
    - export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    - kubectl version --client
    - kubectl cluster-info
    - kubectl get nodes

  script:
    - echo "Deploying NextJS frontend to Kubernetes..."

    - kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

    - |
      kubectl create secret docker-registry gitlab-registry \
        --docker-server=$CI_REGISTRY \
        --docker-username=$CI_REGISTRY_USER \
        --docker-password=$CI_REGISTRY_PASSWORD \
        --docker-email=$GITLAB_USER_EMAIL \
        -n $KUBE_NAMESPACE \
        --dry-run=client -o yaml | kubectl apply -f -

    - echo "Applying frontend ArgoCD application..."
    - kubectl apply -f k8s/argocd/

    - sleep 5

    - |
      if kubectl get application kyc-blockchain-frontend -n argocd >/dev/null 2>&1; then
        echo "Syncing kyc-blockchain-frontend application..."
        kubectl patch application kyc-blockchain-frontend -n argocd \
          --type merge \
          -p '{"operation":{"sync":{"syncStrategy":{"apply":{"force":true}}}}}' || true
      else
        echo "kyc-blockchain-frontend ArgoCD application not found, skipping sync"
      fi

  when: manual
  only:
    - main
    - develop